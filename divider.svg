<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0b080c;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7f40ff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#c2a4ff;stop-opacity:0.7"/>
      <stop offset="80%" style="stop-color:#7f40ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0b080c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0b080c;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7f40ff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#c2a4ff;stop-opacity:0.25"/>
      <stop offset="70%" style="stop-color:#7f40ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0b080c;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Glow behind -->
  <rect x="0" y="2" width="900" height="8" rx="4" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Main line -->
  <rect x="0" y="5" width="900" height="2" rx="1" fill="url(#line)"/>
  <!-- Center diamond -->
  <rect x="447" y="3" width="6" height="6" rx="1" fill="#c2a4ff" opacity="0.5" transform="rotate(45 450 6)"/>
</svg>

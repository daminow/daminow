<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b080c"/>
      <stop offset="50%" style="stop-color:#110d18"/>
      <stop offset="100%" style="stop-color:#1a1225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f40ff"/>
      <stop offset="100%" style="stop-color:#c2a4ff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2a4ff"/>
      <stop offset="50%" style="stop-color:#7f40ff"/>
      <stop offset="100%" style="stop-color:#fb8dff"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>

    <style>
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0); opacity: 0.08; }
        50% { transform: translate(20px, -15px); opacity: 0.14; }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0); opacity: 0.06; }
        50% { transform: translate(-15px, 10px); opacity: 0.1; }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(0, 0); opacity: 0.05; }
        50% { transform: translate(10px, 12px); opacity: 0.09; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      @keyframes lineDraw {
        0% { stroke-dashoffset: 140; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes particleFloat {
        0%, 100% { transform: translateY(0); opacity: 0.3; }
        50% { transform: translateY(-8px); opacity: 0.7; }
      }
      .glow1 { animation: float1 6s ease-in-out infinite; }
      .glow2 { animation: float2 8s ease-in-out infinite; }
      .glow3 { animation: float3 7s ease-in-out infinite; }
      .accent-line { animation: lineDraw 2s ease-out forwards; stroke-dasharray: 140; stroke-dashoffset: 140; }
      .name { animation: fadeIn 1s ease-out 0.3s both; }
      .role { animation: fadeIn 1s ease-out 0.6s both; }
      .tagline { animation: fadeIn 1s ease-out 0.9s both; }
      .dot { animation: particleFloat 3s ease-in-out infinite; }
      .dot:nth-child(2) { animation-delay: 0.5s; }
      .dot:nth-child(3) { animation-delay: 1s; }
      .dot:nth-child(4) { animation-delay: 1.5s; }
      .dot:nth-child(5) { animation-delay: 2s; }
      .bottom-line { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="60" x2="900" y2="60" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="300" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="300" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="300" stroke="#c2a4ff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="300" stroke="#c2a4ff" stroke-width="0.5"/>
  </g>

  <!-- Decorative glows -->
  <circle class="glow1" cx="130" cy="140" r="130" fill="#7f40ff" opacity="0.08" filter="url(#blur1)"/>
  <circle class="glow2" cx="780" cy="90" r="110" fill="#fb8dff" opacity="0.06" filter="url(#blur1)"/>
  <circle class="glow3" cx="500" cy="260" r="90" fill="#c2a4ff" opacity="0.05" filter="url(#blur1)"/>
  <circle class="glow2" cx="400" cy="50" r="70" fill="#7f40ff" opacity="0.04" filter="url(#blur2)"/>

  <!-- Floating particles -->
  <circle class="dot" cx="680" cy="60" r="2" fill="#c2a4ff" opacity="0.3"/>
  <circle class="dot" cx="720" cy="200" r="1.5" fill="#7f40ff" opacity="0.4"/>
  <circle class="dot" cx="800" cy="150" r="2.5" fill="#c2a4ff" opacity="0.2"/>
  <circle class="dot" cx="650" cy="250" r="1.5" fill="#fb8dff" opacity="0.3"/>
  <circle class="dot" cx="850" cy="230" r="2" fill="#7f40ff" opacity="0.25"/>
  <circle class="dot" cx="580" cy="40" r="1.5" fill="#c2a4ff" opacity="0.35"/>
  <circle class="dot" cx="760" cy="270" r="2" fill="#fb8dff" opacity="0.2"/>

  <!-- Code bracket decoration -->
  <g opacity="0.06" transform="translate(700, 80)">
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="80" fill="#c2a4ff" font-weight="200">{</text>
  </g>
  <g opacity="0.06" transform="translate(820, 250)">
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="80" fill="#c2a4ff" font-weight="200">}</text>
  </g>

  <!-- Accent line -->
  <line class="accent-line" x1="100" y1="195" x2="240" y2="195" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Name -->
  <text class="name" x="100" y="130" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#eae5ec" letter-spacing="3">
    TIMUR DAMINOV
  </text>

  <!-- Role -->
  <text class="role" x="100" y="175" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="url(#accent2)" letter-spacing="5">
    FULL-STACK DEVELOPER
  </text>

  <!-- Tagline -->
  <text class="tagline" x="100" y="240" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" fill="#8a8694" letter-spacing="2">
    WEB  &amp;  AI  &amp;  BOTS  &amp;  DESIGN
  </text>

  <!-- Stats pills -->
  <g class="tagline">
    <rect x="100" y="255" width="70" height="22" rx="11" fill="#7f40ff" opacity="0.15"/>
    <text x="135" y="270" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2a4ff" text-anchor="middle" font-weight="500">7+ YRS</text>

    <rect x="180" y="255" width="90" height="22" rx="11" fill="#7f40ff" opacity="0.15"/>
    <text x="225" y="270" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2a4ff" text-anchor="middle" font-weight="500">40+ PROJ</text>
  </g>

  <!-- Bottom accent line -->
  <rect class="bottom-line" x="0" y="296" width="900" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
